<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Équipement numérique – Écoles</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f6f9;
      --surface:   #ffffff;
      --border:    #e2e6ed;
      --accent:    #2563eb;
      --accent-lt: #dbeafe;
      --good:      #16a34a;
      --warn:      #d97706;
      --bad:       #dc2626;
      --text:      #1e293b;
      --muted:     #64748b;
      --mono:      'DM Mono', monospace;
      --sans:      'DM Sans', sans-serif;
      --radius:    10px;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      font-size: 14px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 20px; height: 20px; fill: #fff; }
    .header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
    .header p  { font-size: 11px; color: var(--muted); }

    /* ── Search bar ── */
    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      transition: border-color .15s;
      outline: none;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }

    /* ── Status bar ── */
    #status {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      min-height: 16px;
    }

    /* ── Results list ── */
    #results {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .result-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(37,99,235,.1);
    }
    .result-card.active {
      border-color: var(--accent);
      background: #f0f6ff;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag-uai {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--accent-lt);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 5px;
      font-weight: 500;
    }

    /* ── Metric tiles ── */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 10px;
    }
    .metric-tile {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .metric-tile.active { background: #fff; }
    .mt-icon-label {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .mt-icon { font-size: 12px; }
    .mt-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      font-weight: 500;
    }
    .mt-value {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      line-height: 1.1;
    }
    .mt-sub {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.3;
    }
    .color-good { color: var(--good); }
    .color-warn { color: var(--warn); }
    .color-bad  { color: var(--bad);  }

    /* ── Comparison table (expanded) ── */
    .cmp-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .cmp-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .cmp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .cmp-table thead th {
      text-align: right;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      padding: 2px 6px 4px;
    }
    .cmp-table thead th:first-child { text-align: left; }
    .cmp-lbl {
      color: var(--muted);
      font-size: 11px;
      padding: 4px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }
    .cmp-val {
      font-family: var(--mono);
      font-size: 12px;
      text-align: right;
      padding: 4px 6px;
      color: var(--text);
    }
    .cmp-school-row .cmp-lbl { color: var(--text); font-weight: 600; }
    .cmp-school-row .cmp-val { font-size: 13px; font-weight: 500; }
    .cmp-sep td { height: 6px; }
    .cmp-legend {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Empty states ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state svg {
      width: 40px; height: 40px;
      stroke: var(--border);
      fill: none;
      stroke-width: 1.5;
      margin-bottom: 10px;
    }
    .empty-state p { font-size: 13px; }

    mark { background: var(--accent-lt); color: var(--accent); border-radius: 2px; padding: 0 1px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><path d="M12 3L2 9l10 6 10-6-10-6zM2 17l10 6 10-6M2 13l10 6 10-6"/></svg>
  </div>
  <div>
    <h1>Équipement numérique</h1>
    <p>Rechercher une école par UAI ou nom</p>
  </div>
</div>

<div class="search-wrap">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input id="searchInput" type="text" placeholder="Ex : 0280576Z ou Charlemagne…" autocomplete="off" />
</div>

<div id="status">En attente des données Grist…</div>
<div id="results"></div>

<script>
  let allRecords = [];
  let expandedId = null;
  const MAX_RESULTS = 50;

  /* ── Helpers ── */
  function norm(s) {
    return String(s ?? '').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function fmt(v) {
    if (v === null || v === undefined || v === '' || isNaN(v)) return '—';
    return Number(v).toFixed(1);
  }

  function ratioColor(v, moy) {
    if (isNaN(v)) return '';
    if (moy && !isNaN(moy)) {
      if (v >= moy * 1.1) return 'color-good';
      if (v <= moy * 0.9) return 'color-bad';
      return 'color-warn';
    }
    if (v >= 80) return 'color-good';
    if (v >= 40) return 'color-warn';
    return 'color-bad';
  }

  function highlight(text, query) {
    if (!query) return escHtml(text);
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(${escaped})`, 'gi');
    return escHtml(text).replace(re, '<mark>$1</mark>');
  }

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Resolve column names (Grist may rename accented/special chars) ── */
  function resolveField(rec, candidates) {
    for (const c of candidates) {
      if (rec[c] !== undefined) return rec[c];
    }
    return null;
  }

  function extractFields(rec) {
    return {
      uai:            resolveField(rec, ['UAI','uai']),
      nom:            resolveField(rec, ['Nom','nom','name']),
      ville:          resolveField(rec, ['Ville','ville']),
      dept:           resolveField(rec, ['D_partement__texte_','Département__texte_','departement','dept','Departement_texte_']),
      circo:          resolveField(rec, ['LIB_CIRCO','lib_circo']),
      nbEleves:       resolveField(rec, ['Nb_eleves','nb_eleves','Nb_Eleves']),
      // Ordinateurs
      ratio:          resolveField(rec, ['ratio_ordinateur']),
      moyAcadOrdi:    resolveField(rec, ['Moy_acad_ratio_ordi']),
      moyDeptOrdi:    resolveField(rec, ['Moy_depart_ratio_ordi']),
      moyCircoOrdi:   resolveField(rec, ['Moy_circo_ratio_ordi']),
      moyCommOrdi:    resolveField(rec, ['Moy_commune_ratio_ordi']),
      // Tablettes
      ratioTab:       resolveField(rec, ['ratio_tablette']),
      moyAcadTab:     resolveField(rec, ['Moy_acad_ratio_tablette']),
      moyDeptTab:     resolveField(rec, ['Moy_depart_ratio_tablette']),
      moyCircoTab:    resolveField(rec, ['Moy_circo_ratio_tablette']),
      moyCommTab:     resolveField(rec, ['Moy_commune_ratio_tablette']),
      // Projection
      pctProj:        resolveField(rec, ['pourcentage_equip_proj']),
      moyAcadProj:    resolveField(rec, ['Moy_acad_pourcentage_equip_proj']),
      moyDeptProj:    resolveField(rec, ['Moy_depart_pourcentage_equip_proj']),
      moyCircoProj:   resolveField(rec, ['Moy_circo_pourcentage_equip_proj']),
      moyCommProj:    resolveField(rec, ['Moy_commune_pourcentage_equip_proj']),
    };
  }

  /* ── Render ── */
  function render(query) {
    const q = norm(query.trim());
    const results = document.getElementById('results');
    const status  = document.getElementById('status');

    if (!allRecords.length) {
      status.textContent = 'Aucune donnée disponible.';
      results.innerHTML = '';
      return;
    }

    // Filter
    let filtered = q === ''
      ? allRecords.slice(0, MAX_RESULTS)
      : allRecords.filter(r => {
          const f = extractFields(r);
          return norm(f.uai).includes(q) || norm(f.nom).includes(q);
        }).slice(0, MAX_RESULTS);

    status.textContent = q === ''
      ? `${allRecords.length} écoles • tapez pour filtrer`
      : `${filtered.length} résultat${filtered.length > 1 ? 's' : ''} pour « ${query} »`;

    if (!filtered.length) {
      results.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <p>Aucune école trouvée</p>
        </div>`;
      return;
    }

    results.innerHTML = filtered.map(rec => {
      const f = extractFields(rec);
      const id = rec.id;
      const ratio    = parseFloat(f.ratio);
      const ratioTab = parseFloat(f.ratioTab);
      const pctProj  = parseFloat(f.pctProj);
      const isExpanded = expandedId === id;
      const nomClean = String(f.nom ?? '').trim();
      const uaiStr   = String(f.uai ?? '').trim();

      function elevesFor1(r) {
        const v = parseFloat(r);
        if (!v || isNaN(v) || v === 0) return null;
        return Math.round(100 / v);
      }

      function metricTile(icon, label, value, colorClass, subLine) {
        const valStr = (value === null || value === undefined || isNaN(value)) ? '—' : fmt(value);
        return `
          <div class="metric-tile ${isExpanded ? 'active' : ''}">
            <div class="mt-icon-label">
              <span class="mt-icon">${icon}</span>
              <span class="mt-label">${label}</span>
            </div>
            <div class="mt-value ${colorClass}">${valStr}</div>
            ${subLine ? `<div class="mt-sub">${subLine}</div>` : '<div class="mt-sub">&nbsp;</div>'}
          </div>`;
      }

      const n1 = elevesFor1(ratio);
      const n2 = elevesFor1(ratioTab);

      const tile1 = metricTile('💻', 'Ordinateurs',  ratio,    ratioColor(ratio,    parseFloat(f.moyDeptOrdi)), n1 ? `${n1} élève${n1>1?'s':''} pour 1 ordi` : null);
      const tile2 = metricTile('📱', 'Tablettes',    ratioTab, ratioColor(ratioTab, parseFloat(f.moyDeptTab)),  n2 ? `${n2} élève${n2>1?'s':''} pour 1 tablette` : null);
      const tile3 = metricTile('📽️', '% Projection', isNaN(pctProj)?null:pctProj, ratioColor(pctProj, parseFloat(f.moyDeptProj)), !isNaN(pctProj) ? `moy. dépt : ${fmt(f.moyDeptProj)}%` : null);

      // ── Comparison table (expanded) ──
      function cmpRow(label, vOrdi, vTab, vProj) {
        return `
          <tr>
            <td class="cmp-lbl">${label}</td>
            <td class="cmp-val">${fmt(vOrdi)}</td>
            <td class="cmp-val">${fmt(vTab)}</td>
            <td class="cmp-val">${fmt(vProj)}</td>
          </tr>`;
      }

      const circoLabel = f.circo ? escHtml(String(f.circo)) : 'Circonscription';
      const villeLabel = f.ville  ? escHtml(String(f.ville))  : 'Commune';

      const detailHtml = isExpanded ? `
        <div class="cmp-section">
          <div class="cmp-title">Comparaison aux moyennes</div>
          <table class="cmp-table">
            <thead>
              <tr>
                <th></th>
                <th>💻 Ordi</th>
                <th>📱 Tablette</th>
                <th>📽️ Proj.</th>
              </tr>
            </thead>
            <tbody>
              <tr class="cmp-school-row">
                <td class="cmp-lbl">Cette école</td>
                <td class="cmp-val ${ratioColor(ratio,    parseFloat(f.moyDeptOrdi))}">${fmt(ratio)}</td>
                <td class="cmp-val ${ratioColor(ratioTab, parseFloat(f.moyDeptTab))}">${fmt(ratioTab)}</td>
                <td class="cmp-val ${ratioColor(pctProj,  parseFloat(f.moyDeptProj))}">${fmt(pctProj)}</td>
              </tr>
              <tr class="cmp-sep"><td colspan="4"></td></tr>
              ${cmpRow('Académie',       f.moyAcadOrdi,  f.moyAcadTab,   f.moyAcadProj)}
              ${cmpRow('Département',    f.moyDeptOrdi,  f.moyDeptTab,   f.moyDeptProj)}
              ${cmpRow(circoLabel,       f.moyCircoOrdi, f.moyCircoTab,  f.moyCircoProj)}
              ${cmpRow(villeLabel,       f.moyCommOrdi,  f.moyCommTab,   f.moyCommProj)}
            </tbody>
          </table>
          <div class="cmp-legend">
            <span class="color-good">■</span> au-dessus de la moy. dépt &nbsp;
            <span class="color-warn">■</span> proche &nbsp;
            <span class="color-bad">■</span> en-dessous
          </div>
        </div>
      ` : '';

      return `
        <div class="result-card ${isExpanded ? 'active' : ''}" data-id="${id}">
          <div class="card-top">
            <div class="card-meta">
              <div class="card-name">${highlight(nomClean, query)}</div>
              <div class="card-sub">
                <span class="tag-uai">${escHtml(uaiStr)}</span>
                <span>${escHtml(String(f.ville ?? ''))}</span>
                ${f.dept ? `<span>${escHtml(String(f.dept))}</span>` : ''}
                ${f.circo ? `<span>${escHtml(String(f.circo))}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="metrics-row">
            ${tile1}${tile2}${tile3}
          </div>
          ${detailHtml}
        </div>`;
    }).join('');

    // Click handlers
    results.querySelectorAll('.result-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = parseInt(card.dataset.id);
        expandedId = expandedId === id ? null : id;
        render(document.getElementById('searchInput').value);
      });
    });
  }

  /* ── Grist integration ── */
  document.getElementById('searchInput').addEventListener('input', e => {
    expandedId = null;
    render(e.target.value);
  });

  function onRecords(records) {
    allRecords = records;
    render(document.getElementById('searchInput').value);
  }

  if (typeof grist !== 'undefined') {
    grist.ready({ requiredAccess: 'read table' });
    grist.onRecords(onRecords);
  } else {
    // Développement hors Grist : données fictives
    document.getElementById('status').textContent = 'Mode démo (hors Grist)';
    allRecords = [
      { id: 1, UAI: '0280576Z', Nom: ' Ecole primaire Charlemagne - Saint-Martin-de-Nigelles', Ville: 'ST MARTIN DE NIGELLES', LIB_CIRCO: 'IEN CHARTRES 4',
        ratio_ordinateur: 4.0,  Moy_acad_ratio_ordi: 16.0, Moy_depart_ratio_ordi: 17.0, Moy_circo_ratio_ordi: 14.0, Moy_commune_ratio_ordi: 4.0,
        ratio_tablette: 25.0,   Moy_acad_ratio_tablette: 18.0, Moy_depart_ratio_tablette: 17.0, Moy_circo_ratio_tablette: 20.0, Moy_commune_ratio_tablette: 25.0,
        pourcentage_equip_proj: 100.0, Moy_acad_pourcentage_equip_proj: 88.0, Moy_depart_pourcentage_equip_proj: 93.0, Moy_circo_pourcentage_equip_proj: 84.0, Moy_commune_pourcentage_equip_proj: 100.0,
        Nb_eleves: 130 },
      { id: 2, UAI: '0280580D', Nom: ' Ecole primaire - Villiers-le-Morhier', Ville: 'VILLIERS LE MORHIER', LIB_CIRCO: 'IEN CHARTRES 4',
        ratio_ordinateur: 33.0, Moy_acad_ratio_ordi: 16.0, Moy_depart_ratio_ordi: 17.0, Moy_circo_ratio_ordi: 14.0, Moy_commune_ratio_ordi: 33.0,
        ratio_tablette: 0.0,    Moy_acad_ratio_tablette: 18.0, Moy_depart_ratio_tablette: 17.0, Moy_circo_ratio_tablette: 20.0, Moy_commune_ratio_tablette: 0.0,
        pourcentage_equip_proj: 120.0, Moy_acad_pourcentage_equip_proj: 88.0, Moy_depart_pourcentage_equip_proj: 93.0, Moy_circo_pourcentage_equip_proj: 84.0, Moy_commune_pourcentage_equip_proj: 120.0,
        Nb_eleves: 126 },
      { id: 3, UAI: '0280910M', Nom: ' Ecole élémentaire Emile Pottier - Gallardon', Ville: 'GALLARDON', LIB_CIRCO: 'IEN CHARTRES 4',
        ratio_ordinateur: 4.0,  Moy_acad_ratio_ordi: 16.0, Moy_depart_ratio_ordi: 17.0, Moy_circo_ratio_ordi: 14.0, Moy_commune_ratio_ordi: 4.0,
        ratio_tablette: 7.0,    Moy_acad_ratio_tablette: 18.0, Moy_depart_ratio_tablette: 17.0, Moy_circo_ratio_tablette: 20.0, Moy_commune_ratio_tablette: 7.0,
        pourcentage_equip_proj: 100.0, Moy_acad_pourcentage_equip_proj: 88.0, Moy_depart_pourcentage_equip_proj: 93.0, Moy_circo_pourcentage_equip_proj: 84.0, Moy_commune_pourcentage_equip_proj: 100.0,
        Nb_eleves: 197 },
    ];
    render('');
  }
</script>
</body>
</html>
