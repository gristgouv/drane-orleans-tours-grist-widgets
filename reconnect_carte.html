<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reconnect – Carte</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f4f6f9;
      --surface: #ffffff;
      --border:  #e2e6ed;
      --accent:  #2563eb;
      --aclt:    #dbeafe;
      --good:    #16a34a;
      --warn:    #d97706;
      --bad:     #dc2626;
      --text:    #1e293b;
      --muted:   #64748b;
      --mono:    'DM Mono', monospace;
      --sans:    'DM Sans', sans-serif;
      --p1:      #dc2626; --p1-lt: #fef2f2; --p1-c: #b91c1c;
      --p2:      #d97706; --p2-lt: #fff7ed; --p2-c: #c2410c;
      --p3:      #16a34a; --p3-lt: #f0fdf4; --p3-c: #166534;
    }
    html, body { height: 100%; overflow: hidden; font-family: var(--sans); color: var(--text); background: var(--bg); }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Toolbar ── */
    #toolbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 10px 14px; background: var(--surface);
      border-bottom: 1px solid var(--border); z-index: 100;
    }
    .toolbar-title { font-size: 13px; font-weight: 700; margin-right: 4px; }

    /* Toggle */
    .toggle-row { display: flex; gap: 4px; }
    .toggle-btn {
      padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 6px;
      background: var(--surface); font-family: var(--sans); font-size: 11px;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .toggle-btn.active { border-color: var(--accent); background: var(--aclt); color: var(--accent); }

    /* Search */
    .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 320px; }
    .search-wrap svg {
      position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round;
      pointer-events: none;
    }
    #searchInput {
      width: 100%; padding: 6px 8px 6px 28px; border: 1.5px solid var(--border); border-radius: 6px;
      font-family: var(--sans); font-size: 12px; background: var(--bg); color: var(--text);
      outline: none; transition: border-color .15s;
    }
    #searchInput:focus { border-color: var(--accent); background: #fff; }
    #searchInput::placeholder { color: var(--muted); }

    /* Counter */
    #counter { font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; }

    /* Legend */
    .legend { display: flex; gap: 10px; align-items: center; }
    .leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ── Map ── */
    #map-wrap { flex: 1; position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* ── Card panel ── */
    #card-panel {
      position: absolute; top: 10px; right: 10px; bottom: 10px;
      width: 300px; max-width: calc(100% - 20px);
      background: var(--surface); border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      display: flex; flex-direction: column;
      transform: translateX(320px); transition: transform .25s ease;
      z-index: 500; overflow: hidden;
    }
    #card-panel.open { transform: translateX(0); }

    .card-close {
      position: absolute; top: 10px; right: 10px; width: 24px; height: 24px;
      border-radius: 50%; background: var(--bg); border: 1px solid var(--border);
      cursor: pointer; display: grid; place-items: center;
      font-size: 12px; color: var(--muted); z-index: 1;
    }
    .card-close:hover { background: #fee2e2; color: var(--bad); border-color: #fca5a5; }

    .card-header {
      padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .card-type { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .card-name { font-size: 14px; font-weight: 700; line-height: 1.3; padding-right: 20px; }
    .card-sub  { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .tag-uai {
      font-family: var(--mono); font-size: 9px; background: var(--aclt);
      color: var(--accent); border-radius: 3px; padding: 1px 5px; font-weight: 500;
    }

    .card-body { flex: 1; overflow-y: auto; padding: 14px 16px; }

    /* Badge Reconnect */
    .badge { display: inline-block; font-size: 11px; font-weight: 600; border-radius: 5px; padding: 3px 8px; }
    .badge-p1 { background: var(--p1-lt); color: var(--p1-c); }
    .badge-p2 { background: var(--p2-lt); color: var(--p2-c); }
    .badge-p3 { background: var(--p3-lt); color: var(--p3-c); }

    /* Indicator rows */
    .ind-section { margin-bottom: 16px; }
    .ind-section-title { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }

    .ind-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .ind-icon  { font-size: 14px; flex-shrink: 0; }
    .ind-info  { flex: 1; min-width: 0; }
    .ind-label { font-size: 10px; color: var(--muted); }
    .ind-val   { font-family: var(--mono); font-size: 14px; font-weight: 500; }
    .ind-bar-track { width: 100%; height: 5px; background: var(--border); border-radius: 3px; margin-top: 3px; overflow: hidden; }
    .ind-bar-fill  { height: 100%; border-radius: 3px; transition: width .3s ease; }
    .ind-diff  { font-size: 10px; white-space: nowrap; flex-shrink: 0; }
    .diff-good { color: var(--good); }
    .diff-bad  { color: var(--bad);  }
    .diff-neu  { color: var(--muted); }

    /* Schools list inside college card */
    .schools-list { display: flex; flex-direction: column; gap: 6px; }
    .school-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px;
    }
    .school-item-name { font-size: 11px; font-weight: 600; }
    .school-item-sub  { font-size: 10px; color: var(--muted); display: flex; gap: 6px; align-items: center; margin-top: 2px; }

    /* Checkbox section */
    .checkbox-section { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--bg); border-radius: 6px; }
    .checkbox-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 11px; color: var(--text); flex: 1; }
    .checkbox-label input { cursor: pointer; width: 16px; height: 16px; }
    .update-status { font-size: 9px; color: var(--muted); transition: all .3s; }
    .validate-btn {
      padding: 5px 10px; background: var(--accent); color: white; border: none; 
      border-radius: 4px; font-size: 10px; font-weight: 600; cursor: pointer;
      transition: background .15s; flex-shrink: 0;
    }
    .validate-btn:hover { background: #1d4ed8; }
    .validate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .card-divider { height: 1px; background: var(--border); margin: 12px 0; }

    /* ── Leaflet custom markers ── */
    .mk { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.3); cursor: pointer; transition: transform .15s; }
    .mk:hover, .mk.selected { transform: scale(1.5); z-index: 999 !important; }
    .mk-p1 { background: var(--p1); }
    .mk-p2 { background: var(--p2); }
    .mk-p3 { background: var(--p3); }
    .mk-college { width: 18px; height: 18px; border-width: 2.5px; border-color: #1e293b; }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="toolbar-title">🗺️ Reconnect</span>
    <div class="toggle-row">
      <button class="toggle-btn active" id="btnEcoles"   onclick="switchMode('ecoles')">🏫 Écoles</button>
      <button class="toggle-btn"        id="btnColleges" onclick="switchMode('colleges')">🏛️ Collèges</button>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" placeholder="Filtrer sur la carte…" autocomplete="off" />
    </div>
    <div class="legend">
      <span class="leg"><span class="leg-dot" style="background:var(--p1)"></span>Très prioritaire</span>
      <span class="leg"><span class="leg-dot" style="background:var(--p2)"></span>Prioritaire</span>
      <span class="leg"><span class="leg-dot" style="background:var(--p3)"></span>Moins prioritaire</span>
      <span class="leg"><span class="leg-dot" style="background:linear-gradient(to right,#dc2626,#d97706,#16a34a);border-radius:3px;width:28px;height:10px"></span>Collèges (dégradé)</span>
    </div>
    <span id="counter">—</span>
  </div>

  <div id="map-wrap">
    <div id="map"></div>

    <div id="card-panel">
      <div class="card-close" onclick="closeCard()">✕</div>
      <div id="card-header" class="card-header"></div>
      <div id="card-body"   class="card-body"></div>
    </div>
  </div>
</div>

<script>
  /* ════ ÉTAT ════ */
  let allRecords = [];
  let mode = 'ecoles';
  let markers = [];
  let selectedMarker = null;
  let currentRowId = null;
  let displayedCardRecordId = null;
  let STATS = { ordi:{}, ips:{}, reussite:{}, connexion:{} };

  /* ════ COLONNES ════ */
  const RES = (rec, keys) => { for (const k of keys) if (rec[k] !== undefined) return rec[k]; return undefined; };
  const UAI_C    = ['UAI_college'];
  const NOM_C    = ['Nom_du_coll_ge_associ_','Nom du collège associé','Nom_du_college_associe'];
  const UAI_E    = ['UAI_ecole'];
  const NOM_E    = ['Appellation_officielle__cole','Appellation officielle école','Appellation_officielle_ecole'];
  const ORDI     = ['Indicateur_ordinateurs','Indicateur ordinateurs','indicateur_ordinateurs'];
  const IPS      = ['IPS_moyen_CM2','IPS moyen CM2'];
  const REUSSITE = ['moyenne_reussite','Moyenne_reussite'];
  const CONNEXION= ['indicateur_de_connexion','indicateur de connexion','Indicateur_de_connexion','Indicateur de connexion'];
  const RECONNECT= ['Reconnect','reconnect'];
  const BESOIN_MATERIEL = ['Besoin_materiel', 'besoin_materiel', 'Besoin matériel'];
  const LAT_E    = ['latitude'];
  const LNG_E    = ['longitude'];
  // Coordonnées collège : recherche dynamique parmi toutes les clés du record
  // → toute colonne contenant "college"+"lat" ou "college"+"lon/lng" est acceptée
  const LAT_C = ['college_latitude','UAI_college_latitude','lat_college','latitude_college','College_latitude'];
  const LNG_C = ['college_longitude','UAI_college_longitude','lng_college','longitude_college','College_longitude'];

  function findCollegeCoord(rec, type) {
    // 1. Essai avec les candidats statiques
    const keys = type === 'lat' ? LAT_C : LNG_C;
    for (const k of keys) {
      if (rec[k] !== undefined && rec[k] !== null && String(rec[k]).trim() !== '') {
        const n = parseFloat(rec[k]);
        if (!isNaN(n)) return n;
      }
    }
    // 2. Recherche dynamique : toute clé contenant "college" et "lat" (ou "lon"/"lng")
    const needle = type === 'lat' ? 'lat' : 'lo';
    for (const k of Object.keys(rec)) {
      const kl = k.toLowerCase();
      if (kl.includes('college') && kl.includes(needle)) {
        const n = parseFloat(rec[k]);
        if (!isNaN(n)) return n;
      }
    }
    return null;
  }

  function fld(rec, keys) {
    const v = RES(rec, keys);
    if (v === undefined || v === null || String(v).trim() === '') return null;
    const n = parseFloat(v); return isNaN(n) ? null : n;
  }
  function str(rec, keys) {
    const v = RES(rec, keys);
    return (v === undefined || v === null) ? '' : String(v).trim();
  }

  /* ════ STATS ════ */
  function computeStats() {
    const get = arr => {
      const v = arr.filter(x => x !== null);
      if (!v.length) return { mean:null, min:null, max:null, n:0 };
      const mean = v.reduce((a,b)=>a+b,0)/v.length;
      return { mean, min:Math.min(...v), max:Math.max(...v), n:v.length };
    };
    STATS.ordi      = get(allRecords.map(r => fld(r, ORDI)));
    STATS.ips       = get(allRecords.map(r => fld(r, IPS)));
    STATS.reussite  = get(allRecords.map(r => fld(r, REUSSITE)));
    STATS.connexion = get(allRecords.map(r => fld(r, CONNEXION)));
  }

  /* ════ HELPERS ════ */
  const norm    = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const escHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmtNum  = (v, d=2) => v===null ? '—' : Number(v).toFixed(d);

  function reconnectClass(val) {
    const n = norm(val||'');
    if (n.includes('tres')||n.includes('très')) return 'p1';
    if (n.includes('moins')) return 'p3';
    return 'p2';
  }
  function reconnectBadge(val) {
    if (!val) return '';
    const cls = reconnectClass(val);
    const emoji = cls==='p1'?'🔴':cls==='p3'?'🟢':'🟡';
    return `<span class="badge badge-${cls}">${emoji} ${escHtml(val)}</span>`;
  }

  /* ════ INDICATEUR ROW ════ */
  const HIGHER_BETTER = { ordi:true, ips:null, reussite:true, connexion:true };

  function indRow(icon, label, val, statKey, dec) {
    const s = STATS[statKey];
    const mean = s.mean;
    const dir  = HIGHER_BETTER[statKey];
    const pct  = (val!==null&&s.min!==null&&s.max!==null&&s.max!==s.min)
      ? Math.max(0, Math.min(100, ((val-s.min)/(s.max-s.min))*100)) : 0;

    let cls = 'diff-neu', arrow = '';
    if (val!==null && mean!==null && dir!==null) {
      const thr = Math.abs(mean)*0.05;
      if (Math.abs(val-mean) > thr) {
        cls   = (dir ? val>mean : val<mean) ? 'diff-good' : 'diff-bad';
        arrow = val>mean ? '▲' : '▼';
      } else { arrow = '→'; }
    }
    const diff = (val!==null&&mean!==null) ? `${arrow} ${val>mean?'+':''}${(val-mean).toFixed(dec)} vs moy.` : '';
    const barClr = cls==='diff-good'?'#16a34a':cls==='diff-bad'?'#dc2626':'#94a3b8';
    
    // Pour connexion, afficher 0 si pas de données
    const displayVal = (statKey === 'connexion' && val === null) ? '0' : fmtNum(val, dec);
    
    // Ratio inverse pour ordinateurs
    let inverseRatio = '';
    if (statKey === 'ordi' && val !== null && val > 0) {
      const eleves_per_ordi = Math.round(1 / val);
      inverseRatio = `<div style="font-size:9px;color:var(--muted);margin-top:2px">1 ordinateur pour ${eleves_per_ordi} élève${eleves_per_ordi>1?'s':''}</div>`;
    }

    return `<div class="ind-row">
      <span class="ind-icon">${icon}</span>
      <div class="ind-info">
        <div class="ind-label">${escHtml(label)}</div>
        <div class="ind-val">${displayVal}</div>
        ${inverseRatio}
        <div class="ind-bar-track"><div class="ind-bar-fill" style="width:${pct}%;background:${barClr}"></div></div>
      </div>
      <span class="ind-diff ${cls}">${diff}</span>
    </div>`;
  }

  /* ════ CARTE ÉCOLE ════ */
  function renderSchoolCard(rec) {
    displayedCardRecordId = rec.id;  // Stocker l'ID du record affiché
    const nomE = str(rec, NOM_E);
    const uaiE = str(rec, UAI_E);
    const nomC = str(rec, NOM_C);
    const uaiC = str(rec, UAI_C);
    const reconnect = str(rec, RECONNECT);
    const besoinMat = RES(rec, BESOIN_MATERIEL);

    document.getElementById('card-header').innerHTML = `
      <div class="card-type">🏫 École</div>
      <div class="card-name">${escHtml(nomE||'—')}</div>
      <div class="card-sub">
        <span class="tag-uai">${escHtml(uaiE)}</span>
        ${reconnectBadge(reconnect)}
      </div>
      <div style="margin-top:6px;font-size:11px;color:var(--muted)">
        🏛️ ${escHtml(nomC||'—')} <span class="tag-uai">${escHtml(uaiC)}</span>
      </div>`;

    document.getElementById('card-body').innerHTML = `
      <div class="ind-section">
        <div class="ind-section-title">Indicateurs (vs moyenne globale)</div>
        ${indRow('💻','Indicateur ordinateurs',   fld(rec,ORDI),      'ordi',      2)}
        ${indRow('📊','IPS moyen CM2',             fld(rec,IPS),       'ips',       1)}
        ${indRow('✅','Moy. réussite CM2',         fld(rec,REUSSITE),  'reussite',  2)}
        ${indRow('📶','Indicateur de connexion',   fld(rec,CONNEXION), 'connexion', 1)}
      </div>
      <div class="card-divider"></div>
      <div class="ind-section">
        <div class="ind-section-title">Informations</div>
        <div class="checkbox-section">
          <label class="checkbox-label">
            <input type="checkbox" id="besoinMatCheckbox" ${besoinMat ? 'checked' : ''} />
            <span>Besoin de matériel</span>
          </label>
          <button id="validateBtn" class="validate-btn">Valider</button>
        </div>
        <span id="updateStatus" class="update-status"></span>
      </div>`;

    // Gérer le clic sur le bouton Valider
    document.getElementById('validateBtn').addEventListener('click', async () => {
      const checkbox = document.getElementById('besoinMatCheckbox');
      const statusSpan = document.getElementById('updateStatus');
      const validateBtn = document.getElementById('validateBtn');
      const newValue = checkbox.checked;
      const besoinMatKey = BESOIN_MATERIEL.find(k => rec[k] !== undefined) || 'Besoin_materiel';
      
      // Feedback immédiat
      statusSpan.textContent = '⏳ Mise à jour...';
      statusSpan.style.color = 'var(--muted)';
      validateBtn.disabled = true;
      
      // Utiliser l'ID du record actuellement affiché
      const recordIdToUpdate = displayedCardRecordId || currentRowId;
      
      if (typeof grist !== 'undefined' && recordIdToUpdate) {
        try {
          // Utiliser grist.selectedTable.update() pour mettre à jour
          await grist.selectedTable.update({
            id: recordIdToUpdate,
            fields: {
              [besoinMatKey]: newValue
            }
          });
          
          console.log('Mise à jour réussie:', { id: recordIdToUpdate, [besoinMatKey]: newValue });
          statusSpan.textContent = '✓ Enregistré';
          statusSpan.style.color = '#16a34a';
        } catch (err) {
          console.error('Erreur mise à jour:', err);
          statusSpan.textContent = '✗ Erreur';
          statusSpan.style.color = '#dc2626';
        }
      } else {
        // Mode démo
        statusSpan.textContent = '✓ Enregistré';
        statusSpan.style.color = '#16a34a';
      }
      
      validateBtn.disabled = false;
      
      // Nettoyer le statut après 3 secondes
      setTimeout(() => {
        statusSpan.textContent = '';
      }, 3000);
    });
  }

  /* ════ CARTE COLLÈGE ════ */
  function renderCollegeCard(college) {
    // college = { uaiC, nomC, ecoles:[] }
    const counts = {p1:0,p2:0,p3:0};
    for (const r of college.ecoles) {
      counts[reconnectClass(str(r,RECONNECT))]++;
    }

    const avg = keys => {
      const v = college.ecoles.map(r=>fld(r,keys)).filter(x=>x!==null);
      return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null;
    };

    const total = college.ecoles.length;
    const pct1 = total ? (college.p1||counts.p1)/total*100 : 0;
    const pct2 = total ? (college.p2||counts.p2)/total*100 : 0;
    const pct3 = total ? (college.p3||counts.p3)/total*100 : 0;
    document.getElementById('card-header').innerHTML = `
      <div class="card-type">🏛️ Collège</div>
      <div class="card-name">${escHtml(college.nomC||'—')}</div>
      <div class="card-sub">
        <span class="tag-uai">${escHtml(college.uaiC)}</span>
        <span>${college.ecoles.length} école${college.ecoles.length>1?'s':''}</span>
      </div>
      <div style="margin-top:8px">
        <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px">
          ${pct1>0?`<div style="width:${pct1}%;background:#dc2626" title="Très prioritaire : ${counts.p1}"></div>`:''}
          ${pct2>0?`<div style="width:${pct2}%;background:#d97706" title="Prioritaire : ${counts.p2}"></div>`:''}
          ${pct3>0?`<div style="width:${pct3}%;background:#16a34a" title="Moins prioritaire : ${counts.p3}"></div>`:''}
        </div>
        <div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap">
          ${counts.p1?`<span class="badge badge-p1">🔴 ×${counts.p1}</span>`:''}
          ${counts.p2?`<span class="badge badge-p2">🟡 ×${counts.p2}</span>`:''}
          ${counts.p3?`<span class="badge badge-p3">🟢 ×${counts.p3}</span>`:''}
        </div>
      </div>`;

    const schoolItems = college.ecoles.map(r => `
      <div class="school-item">
        <div class="school-item-name">${escHtml(str(r,NOM_E)||'—')}</div>
        <div class="school-item-sub">
          <span class="tag-uai">${escHtml(str(r,UAI_E))}</span>
          ${reconnectBadge(str(r,RECONNECT))}
        </div>
      </div>`).join('');

    document.getElementById('card-body').innerHTML = `
      <div class="ind-section">
        <div class="ind-section-title">Moyennes du collège (vs moy. globale)</div>
        ${indRow('💻','Indicateur ordinateurs',  avg(ORDI),      'ordi',      2)}
        ${indRow('📊','IPS moyen CM2',            avg(IPS),       'ips',       1)}
        ${indRow('✅','Moy. réussite CM2',        avg(REUSSITE),  'reussite',  2)}
        ${indRow('📶','Indicateur de connexion',  avg(CONNEXION), 'connexion', 1)}
      </div>
      <div class="card-divider"></div>
      <div class="ind-section">
        <div class="ind-section-title">Écoles associées</div>
        <div class="schools-list">${schoolItems}</div>
      </div>`;
  }

  function openCard() { document.getElementById('card-panel').classList.add('open'); }
  function closeCard() {
    document.getElementById('card-panel').classList.remove('open');
    if (selectedMarker) { selectedMarker._icon?.classList.remove('selected'); selectedMarker = null; }
  }

  /* ════ CARTE LEAFLET ════ */
  const map = L.map('map', { zoomControl: true }).setView([47.7, 1.7], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19,
  }).addTo(map);

  function markerIcon(clsOrColor, isCollege) {
    // Pour les collèges, clsOrColor est une couleur hex ; pour les écoles c'est une classe CSS
    const styleOrClass = isCollege
      ? `style="background:${clsOrColor};width:20px;height:20px;border-radius:50%;border:2.5px solid #1e293b;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer"`
      : `class="mk mk-${clsOrColor}"`;
    return L.divIcon({
      className: '',
      html: `<div ${styleOrClass}></div>`,
      iconSize: [isCollege?20:14, isCollege?20:14],
      iconAnchor: [isCollege?10:7, isCollege?10:7],
    });
  }

  function clearMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    selectedMarker = null;
    closeCard();
  }

  /* ════ DÉGRADÉ COULEUR COLLÈGE ════ */
  // score 0 (tout rouge) → 0.5 (tout orange) → 1 (tout vert)
  // Interpolation rouge→orange→vert
  function lerpColor(a, b, t) {
    const ah = parseInt(a.slice(1),16), bh = parseInt(b.slice(1),16);
    const ar = (ah>>16)&255, ag = (ah>>8)&255, ab = ah&255;
    const br = (bh>>16)&255, bg = (bh>>8)&255, bb = bh&255;
    const r = Math.round(ar + (br-ar)*t);
    const g = Math.round(ag + (bg-ag)*t);
    const bv= Math.round(ab + (bb-ab)*t);
    return '#' + [r,g,bv].map(x=>x.toString(16).padStart(2,'0')).join('');
  }

  function scoreToColor(score) {
    // 0=rouge, 0.5=orange, 1=vert
    const RED = '#dc2626', ORANGE = '#d97706', GREEN = '#16a34a';
    if (score <= 0.5) return lerpColor(RED, ORANGE, score * 2);
    return lerpColor(ORANGE, GREEN, (score - 0.5) * 2);
  }

  /* ════ BUILD COLLEGE MAP ════ */
  function buildCollegeMap() {
    const map_ = new Map();
    for (const rec of allRecords) {
      const uaiC = str(rec, UAI_C);
      if (!uaiC) continue;
      if (!map_.has(uaiC)) {
        map_.set(uaiC, { uaiC, nomC: str(rec, NOM_C), ecoles: [], lat: null, lng: null });
      }
      const c = map_.get(uaiC);
      c.ecoles.push(rec);
      if (c.lat === null) c.lat = findCollegeCoord(rec, 'lat');
      if (c.lng === null) c.lng = findCollegeCoord(rec, 'lng');
    }
    for (const c of map_.values()) {
      const total = c.ecoles.length;
      const p1 = c.ecoles.filter(r => reconnectClass(str(r,RECONNECT))==='p1').length;
      const p2 = c.ecoles.filter(r => reconnectClass(str(r,RECONNECT))==='p2').length;
      const p3 = c.ecoles.filter(r => reconnectClass(str(r,RECONNECT))==='p3').length;
      // score : p3=1 (vert), p2=0.5 (orange), p1=0 (rouge)
      const score = total > 0 ? (p3 * 1 + p2 * 0.5 + p1 * 0) / total : 0.5;
      c.p1 = p1; c.p2 = p2; c.p3 = p3;
      c.gradientColor = scoreToColor(score);
    }
    return map_;
  }


  /* ════ RENDER MARKERS ════ */
  function renderMarkers(query) {
    clearMarkers();
    const q = norm(query.trim());

    if (mode === 'ecoles') {
      const filtered = allRecords.filter(r => {
        if (!q) return true;
        return norm(str(r,NOM_E)).includes(q) || norm(str(r,NOM_C)).includes(q)
            || norm(str(r,UAI_E)).includes(q);
      });

      filtered.forEach(rec => {
        const lat = fld(rec, LAT_E);
        const lng = fld(rec, LNG_E);
        if (lat===null || lng===null) return;
        const cls = reconnectClass(str(rec, RECONNECT));
        const m   = L.marker([lat, lng], { icon: markerIcon(cls, false) }).addTo(map);
        m._rec = rec;
        m.on('click', () => {
          if (selectedMarker) selectedMarker._icon?.classList.remove('selected');
          selectedMarker = m;
          m._icon?.classList.add('selected');
          renderSchoolCard(rec);
          openCard();
        });
        markers.push(m);
      });

      document.getElementById('counter').textContent =
        `${filtered.length} école${filtered.length!==1?'s':''} affichée${filtered.length!==1?'s':''}`;

    } else {
      // Mode collège
      const collegeMap = buildCollegeMap();
      const filtered = Array.from(collegeMap.values()).filter(c => {
        if (!q) return true;
        return norm(c.nomC).includes(q) || norm(c.uaiC).includes(q);
      });

      filtered.forEach(college => {
        if (college.lat === null || college.lng === null) return;
        const m = L.marker([college.lat, college.lng], { icon: markerIcon(college.gradientColor, true) }).addTo(map);
        m._college = college;
        m.on('click', () => {
          if (selectedMarker) selectedMarker._icon?.classList.remove('selected');
          selectedMarker = m;
          m._icon?.classList.add('selected');
          renderCollegeCard(college);
          openCard();
        });
        markers.push(m);
      });

      document.getElementById('counter').textContent =
        `${markers.length} collège${markers.length!==1?'s':''} affiché${markers.length!==1?'s':''}`;
    }

    // Ajuster la vue sur les marqueurs visibles
    if (markers.length > 0) {
      const group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.1), { maxZoom: 12 });
    }
  }

  /* ════ MODE SWITCH ════ */
  function switchMode(m) {
    mode = m;
    document.getElementById('btnEcoles').classList.toggle('active',  m==='ecoles');
    document.getElementById('btnColleges').classList.toggle('active', m==='colleges');
    document.getElementById('searchInput').value = '';
    document.getElementById('searchInput').placeholder =
      m==='ecoles' ? 'Filtrer les écoles…' : 'Filtrer les collèges…';
    renderMarkers('');
  }

  /* ════ GRIST onRecord (surligner l'école sélectionnée) ════ */
  function highlightRecord(rec) {
    currentRowId = rec?.id || null;
    if (!rec || mode !== 'ecoles') return;
    const uaiE = str(rec, UAI_E);
    const found = markers.find(m => m._rec && str(m._rec, UAI_E) === uaiE);
    if (found) {
      if (selectedMarker) selectedMarker._icon?.classList.remove('selected');
      selectedMarker = found;
      found._icon?.classList.add('selected');
      map.panTo(found.getLatLng());
      renderSchoolCard(rec);
      openCard();
    }
  }
