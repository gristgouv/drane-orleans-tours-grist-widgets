function renderFeatureToggles(body) {
  const wrap = el('div', { class: 'feature-toggles' });
  wrap.appendChild(el('div', { class: 'feature-toggles-title' },
    'Options affichées par champ'));

  // Toggle "règles de validation"
  const valCb = el('input', { type: 'checkbox', id: 'tog-show-validation' });
  valCb.checked = !!state.showValidationFields;
  valCb.addEventListener('change', () => {
    // Préserve les valeurs saisies dans le panneau avant de recharger
    state.validators = readConfigPanel();
    state.showValidationFields = valCb.checked;
    renderConfigPanel();
  });
  const valLbl = el('label', { for: 'tog-show-validation' }, [
    'Règles de validation',
    el('em', {}, 'format, regex, valeurs min/max, longueurs, message d\'erreur'),
  ]);
  wrap.appendChild(el('div', { class: 'feature-toggle' }, [valCb, valLbl]));

  // Toggle "logique conditionnelle"
  const condCb = el('input', { type: 'checkbox', id: 'tog-show-conditional' });
  condCb.checked = !!state.showConditionalFields;
  condCb.addEventListener('change', () => {
    state.validators = readConfigPanel();
    state.showConditionalFields = condCb.checked;
    renderConfigPanel();
  });
  const condLbl = el('label', { for: 'tog-show-conditional' }, [
    'Logique conditionnelle',
    el('em', {}, 'champ affiché uniquement si une condition est remplie (showIf)'),
  ]);
  wrap.appendChild(el('div', { class: 'feature-toggle' }, [condCb, condLbl]));

  body.appendChild(wrap);
}

function renderConfigPanel() {
  const body = $('#config-body');
  body.innerHTML = '';

  // Bandeau de préférences en tête (affichage des sections avancées)
  renderFeatureToggles(body);

  if (state.columns.length === 0) {
    body.appendChild(el('p', { class: 'hint' }, "Aucune colonne à configurer."));
    return;
  }

  state.columns.forEach((col, colIdx) => {
    const ovr  = state.validators[col.colId] || {};
    const base = baseTypeOf(col.type);
    const card = el('div', { class: 'col-config', 'data-col': col.colId });

    const totalCols = state.columns.length;
    const upBtn = el('button', {
      type: 'button', title: 'Monter ce champ',
    }, '▲');
    const downBtn = el('button', {
      type: 'button', title: 'Descendre ce champ',
    }, '▼');
    if (colIdx === 0) upBtn.disabled = true;
    if (colIdx === totalCols - 1) downBtn.disabled = true;
    upBtn.addEventListener('click',   () => onMoveCol(col.colId, -1));
    downBtn.addEventListener('click', () => onMoveCol(col.colId,  1));

    card.appendChild(el('div', { class: 'col-config-head' }, [
      el('span', { class: 'col-reorder' }, [upBtn, downBtn]),
      el('strong', {}, col.label + ' '),
      el('span', { class: 'type-badge' }, col.type),
    ]));

    // Présentation : label affiché et description (tous types)
    card.appendChild(el('div', { class: 'row' }, [
      el('div', { class: 'full' }, [
        el('label', {}, 'Label affiché (vide = label Grist)'),
        el('input', {
          type: 'text', 'data-k': 'customLabel',
          value: ovr.customLabel || '', placeholder: col.label,
        }),
      ]),
    ]));

    const descTa = el('textarea', {
      'data-k': 'description', rows: '2',
      placeholder: 'Ex : format attendu, exemple, consigne…',
    });
    descTa.value = ovr.description || '';
    card.appendChild(el('div', { class: 'row' }, [
      el('div', { class: 'full' }, [
        el('label', {}, 'Description / aide (sous le label)'),
        descTa,
      ]),
    ]));

    // Logique conditionnelle : afficher ce champ uniquement si …
    if (state.showConditionalFields) {
      const showIfTa = el('textarea', {
        'data-k': 'showIf', rows: '3',
        placeholder: "Vide = toujours afficher. Ex :\nform.Type == 'Particulier'\nlen(form.Mail) > 1",
      });
      showIfTa.value = ovr.showIf || '';
      card.appendChild(el('div', { class: 'row' }, [
        el('div', { class: 'full' }, [
          el('label', {}, 'Afficher uniquement si (logique conditionnelle)'),
          showIfTa,
          el('div', { class: 'hint' },
            "Syntaxe : form.<colonne> <op> <valeur> — ou fn(form.<colonne>) <op> <valeur>. " +
            "Opérateurs : == != < <= > >=. Fonctions : len, lower, upper, trim. " +
            "Valeurs : 'texte', \"texte\", nombre, true / false / null. " +
            "Une condition par ligne (ET logique). Vide = toujours afficher."),
        ]),
      ]));
    }

    // Apparence : menu déroulant / radio / chips / cases à cocher / auto-complétion
    if (base === 'Choice' || base === 'Ref' || base === 'ChoiceList' || base === 'RefList') {
      const isMulti = (base === 'ChoiceList' || base === 'RefList');
      const choices = isMulti
        ? [['auto',         'Auto · chips cliquables (conseillé)'],
           ['select',       'Menu déroulant (multi)'],
           ['checkbox',     'Cases à cocher'],
           ['autocomplete', 'Auto-complétion (recherche + sélection multiple)']]
        : [['auto',         'Auto · radio si ≤ 5 choix, sinon menu'],
           ['select',       'Menu déroulant'],
           ['radio',        'Boutons radio'],
           ['autocomplete', 'Auto-complétion (tapez le début pour filtrer)']];
      card.appendChild(el('div', { class: 'row' }, [
        el('div', { class: 'full' }, [
          el('label', {}, 'Apparence du champ'),
          (() => {
            const sel = el('select', { 'data-k': 'widget' });
            for (const [val, lbl] of choices) {
              const opt = el('option', { value: val }, lbl);
              if ((ovr.widget || 'auto') === val) opt.selected = true;
              sel.appendChild(opt);
            }
            return sel;
          })(),
        ]),
      ]));
    }

    // Filtre des valeurs proposées (Ref / RefList uniquement)
    if (base === 'Ref' || base === 'RefList') {
      const filterTa = el('textarea', {
        'data-k': 'refFilter', rows: '3',
        placeholder: "Ex :\nchoice.Decision_1 == 'Accepté'\nchoice.Statut != 'Archivé'",
      });
      filterTa.value = ovr.refFilter || '';
      card.appendChild(el('div', { class: 'row' }, [
        el('div', { class: 'full' }, [
          el('label', {}, 'Filtre des valeurs proposées'),
          filterTa,
          el('div', { class: 'hint' },
            "Syntaxe : choice.<colonne> <op> <valeur> — ou fn(choice.<colonne>) <op> <valeur>. " +
            "Opérateurs : == != < <= > >=. Fonctions : len, lower, upper, trim. " +
            "Valeurs : 'texte', \"texte\", nombre, true / false / null. " +
            "Une condition par ligne (ET logique). Ligne commençant par # = commentaire."),
        ]),
      ]));
    }

    // Règles de validation (format, regex, min, max, longueur, message)
    if (state.showValidationFields) {
      if (base === 'Text' || base === 'Any') {
        const row = el('div', { class: 'row' }, [
          el('div', {}, [
            el('label', {}, 'Format prédéfini'),
            (() => {
              const sel = el('select', { 'data-k': 'format' });
              for (const f of ['none', 'email', 'phone', 'url']) {
                const opt = el('option', { value: f }, f);
                if ((ovr.format || 'none') === f) opt.selected = true;
                sel.appendChild(opt);
              }
              return sel;
            })(),
          ]),
          el('div', {}, [
            el('label', {}, 'Message d\'erreur (optionnel)'),
            el('input', { type: 'text', 'data-k': 'errorMsg', value: ovr.errorMsg || '' }),
          ]),
        ]);
        card.appendChild(row);

        card.appendChild(el('div', { class: 'row' }, [
          el('div', { class: 'full' }, [
            el('label', {}, 'Regex personnalisée (priorité sur le format)'),
            el('input', { type: 'text', 'data-k': 'regex', value: ovr.regex || '', placeholder: 'ex. ^[A-Z]{2}\\d{4}$' }),
          ]),
        ]));

        card.appendChild(el('div', { class: 'row' }, [
          el('div', {}, [
            el('label', {}, 'Longueur min'),
            el('input', { type: 'number', 'data-k': 'minLength', value: ovr.minLength ?? '', min: '0' }),
          ]),
          el('div', {}, [
            el('label', {}, 'Longueur max'),
            el('input', { type: 'number', 'data-k': 'maxLength', value: ovr.maxLength ?? '', min: '0' }),
          ]),
        ]));
      }
      else if (base === 'Numeric' || base === 'Int') {
        card.appendChild(el('div', { class: 'row' }, [
          el('div', {}, [
            el('label', {}, 'Valeur min'),
            el('input', { type: 'number', 'data-k': 'min', value: ovr.min ?? '', step: 'any' }),
          ]),
          el('div', {}, [
            el('label', {}, 'Valeur max'),
            el('input', { type: 'number', 'data-k': 'max', value: ovr.max ?? '', step: 'any' }),
          ]),
        ]));
        card.appendChild(el('div', { class: 'row' }, [
          el('div', { class: 'full' }, [
            el('label', {}, 'Message d\'erreur (optionnel)'),
            el('input', { type: 'text', 'data-k': 'errorMsg', value: ovr.errorMsg || '' }),
          ]),
        ]));
      }
      else {
        card.appendChild(el('div', { class: 'hint' },
          "Validation automatique selon le type Grist. Pas de surcharge supplémentaire pour ce type."));
      }
    }

    // Case "Inclure dans le formulaire" — décoché = la colonne n'apparaît pas pour le saisisseur
    const incWrap = el('div', {
      style: 'margin-top:10px; padding-top:8px; border-top:1px dashed var(--border); ' +
             'display:flex; align-items:center; gap:6px;'
    });
    const incCb = el('input', { type: 'checkbox', 'data-k': 'included', id: 'inc-' + col.colId });
    // included est vrai par défaut (undefined ou true = inclus, false = exclu)
    incCb.checked = ovr.included !== false;
    const incLbl = el('label', {
      for: 'inc-' + col.colId,
      style: 'cursor:pointer; font-size:0.78rem; color:var(--text); margin:0; ' +
             'text-transform:none; letter-spacing:0; font-weight:500;'
    }, 'Inclure ce champ dans le formulaire');
    incWrap.appendChild(incCb);
    incWrap.appendChild(incLbl);
    card.appendChild(incWrap);

    // Marque visuellement la carte si la colonne est exclue
    if (ovr.included === false) card.classList.add('excluded');
    // Réagit en direct au cocher/décocher pour mettre à jour le style de la carte
    incCb.addEventListener('change', () => {
      card.classList.toggle('excluded', !incCb.checked);
    });

    // Case "Champ obligatoire" — disponible pour tous les types
    const reqWrap = el('div', {
      style: 'margin-top:6px; display:flex; align-items:center; gap:6px;'
    });
    const reqCb = el('input', { type: 'checkbox', 'data-k': 'required', id: 'req-' + col.colId });
    reqCb.checked = !!ovr.required;
    const reqLbl = el('label', {
      for: 'req-' + col.colId,
      style: 'cursor:pointer; font-size:0.78rem; color:var(--text); margin:0; ' +
             'text-transform:none; letter-spacing:0; font-weight:500;'
    }, 'Champ obligatoire (doit être renseigné)');
    reqWrap.appendChild(reqCb);
    reqWrap.appendChild(reqLbl);
    card.appendChild(reqWrap);

    // Case "Interdire les doublons" — disponible pour tous les types
    const uniqWrap = el('div', {
      style: 'margin-top:6px; display:flex; align-items:center; gap:6px;'
    });
    const uniqCb = el('input', { type: 'checkbox', 'data-k': 'unique', id: 'unq-' + col.colId });
    uniqCb.checked = !!ovr.unique;
    const uniqLbl = el('label', {
      for: 'unq-' + col.colId,
      style: 'cursor:pointer; font-size:0.78rem; color:var(--text); margin:0; ' +
             'text-transform:none; letter-spacing:0; font-weight:500;'
    }, 'Interdire les doublons (valeur unique dans la table)');
    uniqWrap.appendChild(uniqCb);
    uniqWrap.appendChild(uniqLbl);
    card.appendChild(uniqWrap);

    body.appendChild(card);
  });

  renderTextBlocksSection(body);
  renderUniqueGroupsSection(body);
  renderValidationColumnSection(body);
  renderPublicLinkSection(body);
}

function onMoveCol(colId, direction) {
  // Capture les éditions en cours pour ne pas perdre les valeurs non sauvegardées
  state.validators = readConfigPanel();
  // (textBlocks et uniqueGroups sont déjà à jour via leurs écouteurs propres)
  if (!moveField(colId, direction)) return;
  renderConfigPanel();
}

             'border-radius:5px; font-size:0.82rem; font-family:inherit; margin-bottom:8px;'
    });
    posSelect.appendChild(el('option', { value: '__top__' }, 'Tout en haut du formulaire'));
    for (const col of state.columns) {
      posSelect.appendChild(el('option', { value: col.colId },
        `Avant le champ : ${col.label || col.colId}`));
    }
    posSelect.appendChild(el('option', { value: '__bottom__' },
      'Tout en bas (avant les boutons)'));

    // Si la colonne référencée n'existe plus, on retombe sur __top__
    const validPositions = new Set(['__top__', '__bottom__', ...state.columns.map(c => c.colId)]);
    posSelect.value = validPositions.has(block.position) ? block.position : '__top__';
    if (posSelect.value !== block.position) block.position = posSelect.value;
    posSelect.addEventListener('change', () => {
      state.textBlocks[idx].position = posSelect.value;
    });
    card.appendChild(posSelect);

    card.appendChild(el('label', {
      style: 'display:block; font-size:0.72rem; color:var(--muted); margin-bottom:2px; ' +
             'font-weight:600; text-transform:uppercase; letter-spacing:0.3px;'
    }, 'Contenu'));

    const ta = el('textarea', {
      placeholder: 'Texte affiché aux utilisateurs du formulaire…',
      rows: '3',
      style: 'width:100%; padding:6px 8px; border:1px solid var(--border); ' +
             'border-radius:5px; font-size:0.82rem; font-family:inherit; ' +
             'resize:vertical; min-height:60px; line-height:1.4;'
    });
    ta.value = block.content || '';
    ta.addEventListener('input', () => {
      state.textBlocks[idx].content = ta.value;
    });
    card.appendChild(ta);

    container.appendChild(card);
  });
}

      "Aucune contrainte composite définie."));

             'border:1px solid var(--border); border-radius:6px; margin-bottom:6px; flex-wrap:wrap;'

async function onGeneratePublicLink(ev) {
  const btn = ev.currentTarget;

  // Lit les valeurs courantes du panneau
  state.validators        = readConfigPanel();
  state.standaloneTitle   = (document.getElementById('standalone-title').value   || 'Formulaire').trim();
  state.standaloneSuccess = (document.getElementById('standalone-success').value || 'Merci, votre réponse a été enregistrée.').trim();
  const docUrl            = (document.getElementById('standalone-doc-url').value || '').trim();

  if (!docUrl) {
    showToast("Renseignez l'URL du document Grist", 'err');
    return;
  }
  if (!parseGristDocUrl(docUrl)) {
    showToast("URL Grist non reconnue (attendue : .../doc/{docId} ou .../{docId}/...)", 'err');
    return;
  }
  state.docUrl = docUrl;

  // Persiste la config (sans bloquer la génération du lien si setOption échoue)
  try {
    await grist.setOption('validators',        state.validators);
    await grist.setOption('uniqueGroups',      state.uniqueGroups || []);
    await grist.setOption('textBlocks',        state.textBlocks || []);
    await grist.setOption('fieldOrder',        state.fieldOrder || []);
    await grist.setOption('standaloneTitle',   state.standaloneTitle);
    await grist.setOption('standaloneSuccess', state.standaloneSuccess);
    await grist.setOption('docUrl',            state.docUrl);
  } catch (e) { console.warn('[form-validator] setOption :', e); }

  // Recharge le schéma pour que refOptions reflète d'éventuels nouveaux filtres
  try { await loadSchema(); } catch (e) { console.warn('[form-validator] loadSchema:', e); }

  const cfg = {
    title:          state.standaloneTitle,
    successMessage: state.standaloneSuccess,
    docUrl:         state.docUrl,
    tableId:        state.tableId,
    columns: state.columns.map(c => ({
      colId: c.colId, label: c.label, type: c.type,
      choices: c.choices, refOptions: c.refOptions,
    })),
    validators:   state.validators,
    uniqueGroups: state.uniqueGroups || [],
    textBlocks:   state.textBlocks || [],
    fieldOrder:   state.fieldOrder || [],
  };
  const cfgB64 = encodeStandaloneCfg(cfg);
  const pageUrl = window.location.href.split('#')[0].split('?')[0];
  const publicUrl = `${pageUrl}#cfg=${cfgB64}`;

  const out = document.getElementById('public-link-output');
  out.style.display = 'block';
  out.textContent = publicUrl;

  btn.disabled = true;
  try {
    await navigator.clipboard.writeText(publicUrl);
    showToast("Lien copié dans le presse-papiers ✓", 'ok');
  } catch (e) {
    showToast("Lien généré (copiez-le manuellement ci-dessous)", '');
  } finally {
    btn.disabled = false;
  }
}

function readConfigPanel() {
  // On part de l'état existant pour PRÉSERVER les clés des sections actuellement cachées
  // (ex. regex configuré il y a longtemps mais case "Afficher la validation" décochée).
  // Seuls les inputs réellement rendus dans le DOM mettent à jour leur clé.
  const out = JSON.parse(JSON.stringify(state.validators || {}));

  document.querySelectorAll('#config-body .col-config').forEach(card => {
    const colId = card.dataset.col;
    if (!out[colId]) out[colId] = {};
    const cfg = out[colId];

    card.querySelectorAll('[data-k]').forEach(input => {
      const k = input.dataset.k;
      if (input.type === 'checkbox') {
        if (input.checked) {
          cfg[k] = true;
        } else if (k === 'included') {
          // 'included' a un défaut "true" : décoché stocke explicitement false
          cfg[k] = false;
        } else {
          delete cfg[k];   // décocher = retour au défaut (clé absente)
        }
        return;
      }
      const v = input.value;
      if (v === '' || v === null || v === undefined) {
        delete cfg[k];     // input vidé = retour au défaut
      } else {
        cfg[k] = v;
      }
    });

    if (Object.keys(out[colId]).length === 0) delete out[colId];
  });

  return out;
}

//
// ─── Génération de la formule Python ───────────────────────────────────────
//
function escapePyStr(s) {
  // Échappe pour une chaîne Python entre apostrophes simples
  return String(s)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t');
}

const PY_PRESETS = {
  email: { pattern: '^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$', msg: 'adresse e-mail invalide' },
  phone: { pattern: '^[\\d\\s+().\\-]{6,}$',          msg: 'numéro de téléphone invalide' },
  url:   { pattern: '^https?://[^\\s]+$',             msg: 'URL invalide' },
};

function generateValidationFormula() {
  const out = ['import re', '', 'errors = []', ''];
  let hasAnyRule = false;

  for (const col of state.columns) {
    const ovr = state.validators[col.colId];
    if (!ovr || Object.keys(ovr).length === 0) continue;

    const ref  = `$${col.colId}`;
    const lbl  = escapePyStr(col.label || col.colId);
    const base = baseTypeOf(col.type);
    const customMsg = ovr.errorMsg ? escapePyStr(ovr.errorMsg) : null;

    let block = false; // a-t-on écrit au moins une règle pour cette colonne ?

    // ── Champ obligatoire (universel, tous types) ──
    if (ovr.required) {
      if (!block) { out.push(`# ${col.colId} (${col.type})`); out.push(`v = ${ref}`); block = true; }
      const m = customMsg || 'ce champ est obligatoire';
      // Pour Numeric/Int/Date/DateTime, 0 est une valeur valide → on n'utilise pas "not v"
      const acceptsZero = ['Numeric', 'Int', 'Date', 'DateTime'].includes(base);
      const cond = acceptsZero
        ? `v is None or v == ''`
        : `not v or v == ['L'] or (isinstance(v, str) and not v.strip())`;
      out.push(`if ${cond}:`);
      out.push(`    errors.append('${lbl} : ${m}')`);
      hasAnyRule = true;
    }

    // ── Numeric / Int : min / max ──
    if ((base === 'Numeric' || base === 'Int') &&
        ((ovr.min !== undefined && ovr.min !== '') || (ovr.max !== undefined && ovr.max !== ''))) {
      if (!block) { out.push(`# ${col.colId} (${col.type})`); out.push(`v = ${ref}`); block = true; }
      out.push(`if v not in (None, ''):`);
      out.push(`    try:`);
      out.push(`        _n = float(v)`);
      if (ovr.min !== undefined && ovr.min !== '') {
        const m = customMsg || `doit être >= ${ovr.min}`;
        out.push(`        if _n < ${Number(ovr.min)}:`);
        out.push(`            errors.append('${lbl} : ${m}')`);
      }
      if (ovr.max !== undefined && ovr.max !== '') {
        const m = customMsg || `doit être <= ${ovr.max}`;
        out.push(`        if _n > ${Number(ovr.max)}:`);
        out.push(`            errors.append('${lbl} : ${m}')`);
      }
      out.push(`    except (TypeError, ValueError):`);
      out.push(`        errors.append('${lbl} : doit être un nombre')`);
      hasAnyRule = true;
    }

    // ── Text / Any : longueur, format, regex ──
    if ((base === 'Text' || base === 'Any') &&
        (ovr.minLength || ovr.maxLength ||
         (ovr.format && ovr.format !== 'none') ||
         (ovr.regex && ovr.regex.trim()))) {
      if (!block) { out.push(`# ${col.colId} (${col.type})`); out.push(`v = ${ref}`); block = true; }
      out.push(`s = '' if v in (None, '') else str(v)`);

      if (ovr.minLength) {
        const m = customMsg || `longueur minimale ${ovr.minLength}`;
        out.push(`if len(s) < ${Number(ovr.minLength)}:`);
        out.push(`    errors.append('${lbl} : ${m}')`);
      }
      if (ovr.maxLength) {
        const m = customMsg || `longueur maximale ${ovr.maxLength}`;
        out.push(`if len(s) > ${Number(ovr.maxLength)}:`);
        out.push(`    errors.append('${lbl} : ${m}')`);
      }

      // Regex personnalisée (prioritaire)
      if (ovr.regex && ovr.regex.trim()) {
        const m = customMsg || 'format invalide';
        const pat = escapePyStr(ovr.regex);
        out.push(`if s and not re.fullmatch('${pat}', s):`);
        out.push(`    errors.append('${lbl} : ${m}')`);
      }
      // Sinon : format prédéfini
      else if (ovr.format && ovr.format !== 'none') {
        const preset = PY_PRESETS[ovr.format];
        if (preset) {
          const m = customMsg || preset.msg;
          out.push(`if s and not re.fullmatch('${preset.pattern}', s):`);
          out.push(`    errors.append('${lbl} : ${m}')`);
        }
      }
      hasAnyRule = true;
    }

    if (block) out.push('');
  }

  if (!hasAnyRule) {
    return "return ''  # Aucune règle de validation configurée";
  }
  out.push("return ' ; '.join(errors) if errors else ''");
  return out.join('\n');
}

//
// ─── Application de la colonne via applyUserActions ────────────────────────
//
async function applyValidationColumn(colName) {
  const tableId = state.tableId;
  if (!tableId) throw new Error("Aucune table associée au widget");

  const formula = generateValidationFormula();

  // Cherche si la colonne existe déjà (data ou formule)
  const tables = await grist.docApi.fetchTable('_grist_Tables');
  const cols   = await grist.docApi.fetchTable('_grist_Tables_column');

  let parentId = null;
  for (let i = 0; i < tables.id.length; i++) {
    if (tables.tableId[i] === tableId) { parentId = tables.id[i]; break; }
  }

  let exists = false;
  let isFormula = false;
  for (let i = 0; i < cols.id.length; i++) {
    if (cols.parentId[i] === parentId && cols.colId[i] === colName) {
      exists = true;
      isFormula = !!cols.isFormula[i];
      break;
    }
  }

  if (exists && !isFormula) {
    throw new Error(
      `La colonne « ${colName} » existe déjà comme colonne de données. ` +
      `Choisissez un autre nom ou supprimez-la d'abord dans Grist.`
    );
  }

  const action = exists
    ? ['ModifyColumn', tableId, colName, { type: 'Text', isFormula: true, formula }]
    : ['AddColumn',    tableId, colName, { type: 'Text', isFormula: true, formula, label: 'Erreurs de validation' }];

  await grist.docApi.applyUserActions([action]);
}

function onPreviewFormula() {
  // Récupère la config courante du panneau (sans l'enregistrer)
  state.validators = readConfigPanel();
  const code = generateValidationFormula();
  const pre = document.getElementById('python-preview');
  pre.textContent = code;
  pre.style.display = 'block';
}

async function onApplyValidationColumn(ev) {
  const btn = ev.currentTarget;
  state.validators = readConfigPanel();

  const input = document.getElementById('validation-col-name');
  const colName = (input.value || 'Validation').trim();
  if (!colName) {
    showToast("Donnez un nom à la colonne", 'err');
    return;
  }
  // Sanitize : Grist accepte lettres, chiffres, underscore. On remplace les autres par _
  const cleanName = colName.replace(/[^A-Za-z0-9_]/g, '_').replace(/^(\d)/, '_$1');
  if (cleanName !== colName) input.value = cleanName;

  btn.disabled = true;
  try {
    await applyValidationColumn(cleanName);
    state.validationColumnName = cleanName;
    await grist.setOption('validators', state.validators);
    await grist.setOption('validationColumnName', cleanName);
    showToast(`Colonne « ${cleanName} » créée/mise à jour ✓`, 'ok');
    await refresh();
  } catch (e) {
    console.error('[form-validator] applyValidationColumn:', e);
    showToast(e.message || String(e), 'err');
  } finally {
    btn.disabled = false;
  }
}

function openConfig()  { renderConfigPanel(); $('#config-overlay').classList.add('open'); }
function closeConfig() { $('#config-overlay').classList.remove('open'); }

//
// ─── Boot ──────────────────────────────────────────────────────────────────
//
async function boot() {
  if (STANDALONE) {
    return bootStandalone();
  }
  return bootGrist();
}

async function bootGrist() {
  $('#btn-config').addEventListener('click', openConfig);
  $('#btn-config-close').addEventListener('click', closeConfig);
  $('#btn-config-save').addEventListener('click', saveConfig);
  $('#btn-config-reset').addEventListener('click', () => {
    state.validators = {};
    state.uniqueGroups = [];
    state.textBlocks = [];
    state.fieldOrder = [];
    // Recharge le schéma pour récupérer l'ordre natif des colonnes
    loadSchema().catch(e => console.warn('[form-validator] reset/loadSchema:', e))
      .finally(() => renderConfigPanel());
  });
  $('#btn-refresh').addEventListener('click', refresh);

  await grist.ready({ requiredAccess: 'full' });

  // Récupère les options sauvegardées
  grist.onOptions((opts) => {
    state.validators = (opts && opts.validators) || {};
    state.uniqueGroups = (opts && Array.isArray(opts.uniqueGroups)) ? opts.uniqueGroups : [];
    state.textBlocks   = (opts && Array.isArray(opts.textBlocks))   ? opts.textBlocks   : [];
    state.fieldOrder   = (opts && Array.isArray(opts.fieldOrder))   ? opts.fieldOrder   : [];
    applyFieldOrder();
    state.validationColumnName = (opts && opts.validationColumnName) || 'Validation';
    state.standaloneTitle      = (opts && opts.standaloneTitle)   || 'Formulaire';
    state.standaloneSuccess    = (opts && opts.standaloneSuccess) || 'Merci, votre réponse a été enregistrée.';
    state.docUrl               = (opts && opts.docUrl) || null;

    // Affichage des sections avancées : préférence explicite > auto-détection sur la config existante
    if (opts && 'showValidationFields' in opts) {
      state.showValidationFields = !!opts.showValidationFields;
    } else {
      state.showValidationFields = hasAnyValidationConfig();
    }
    if (opts && 'showConditionalFields' in opts) {
      state.showConditionalFields = !!opts.showConditionalFields;
    } else {
      state.showConditionalFields = hasAnyConditionalConfig();
    }

    applyStandaloneTitleToTopbar();
    renderForm();
  });

  // Récupère le serveur + docId pour pouvoir générer le lien public
  try {
    const tok = await grist.docApi.getAccessToken({ readOnly: true });
    const m = /^(https?:\/\/[^\/]+(?:\/o\/[^\/]+)?)\/api\/docs\/([^\/?#]+)/.exec(tok.baseUrl);
    if (m) { state.server = m[1]; state.docId = m[2]; }
  } catch (e) {
    console.warn('[form-validator] getAccessToken a échoué :', e);
  }

  await refresh();
}

async function bootStandalone() {
  // Masque les boutons inutiles pour un visiteur non connecté
  const btnConfig  = document.getElementById('btn-config');
  const btnRefresh = document.getElementById('btn-refresh');
  const hint       = document.querySelector('.config-hint');
  if (btnConfig)  btnConfig.style.display  = 'none';
  if (btnRefresh) btnRefresh.style.display = 'none';
  if (hint)       hint.style.display       = 'none';

  try {
    const cfg = decodeStandaloneCfg(HASH_PARAMS.get('cfg'));

    state.tableId            = cfg.tableId;
    state.columns            = cfg.columns || [];
    state.validators         = cfg.validators || {};
    state.uniqueGroups       = Array.isArray(cfg.uniqueGroups) ? cfg.uniqueGroups : [];
    state.textBlocks         = Array.isArray(cfg.textBlocks)   ? cfg.textBlocks   : [];
    state.fieldOrder         = Array.isArray(cfg.fieldOrder)   ? cfg.fieldOrder   : [];
    applyFieldOrder();
    state.standaloneTitle    = cfg.title || 'Formulaire';
    state.standaloneSuccess  = cfg.successMessage || 'Merci, votre réponse a été enregistrée.';

    const parsed = parseGristDocUrl(cfg.docUrl || '');
    if (!parsed) throw new Error("URL Grist invalide dans le lien");
    state.server = parsed.server;
    state.docId  = parsed.docId;

    document.querySelector('#topbar-left h2').textContent = state.standaloneTitle;
    document.getElementById('topbar-sub').textContent     = '';
    document.title = state.standaloneTitle;

    renderForm();
  } catch (e) {
    console.error('[form-validator] cfg invalide :', e);
    document.querySelector('#topbar-left h2').textContent = 'Formulaire';
    document.getElementById('topbar-sub').textContent     = '';
    const host = document.getElementById('form-host');
    host.innerHTML = '';
    host.appendChild(el('div', { class: 'form-empty' },
      ["Lien invalide : " + (e.message || e)]));
  }
}

function parseGristDocUrl(url) {
  // baseUrl provenant de getAccessToken : https://server[/o/orga]/api/docs/{docId}
  let m = /^(https?:\/\/[^\/]+(?:\/o\/[^\/]+)?)\/api\/docs\/([^\/?#]+)/.exec(url);
  if (m) return { server: m[1], docId: m[2] };
  // URL classique avec /doc/ : https://server[/o/orga]/doc/{docId}[/page]
  m = /^(https?:\/\/[^\/]+(?:\/o\/[^\/]+)?)\/doc\/([^\/?#]+)/.exec(url);
  if (m) return { server: m[1], docId: m[2] };
  // URL self-host raccourcie : https://server[/o/orga]/{docIdLong}/{page}
  m = /^(https?:\/\/[^\/]+(?:\/o\/[^\/]+)?)\/([^\/?#]{12,})(?:\/|$)/.exec(url);
  if (m) return { server: m[1], docId: m[2] };
  return null;
}

const CFG_LZ_PREFIX = 'lz1-';

function encodeStandaloneCfg(obj) {
  const json = JSON.stringify(obj);
  return CFG_LZ_PREFIX + LZString.compressToEncodedURIComponent(json);
}

function decodeStandaloneCfg(s) {
  if (!s) throw new Error("Paramètre cfg manquant");
  // Nouveau format compressé (préfixe "lz1-")
  if (s.startsWith(CFG_LZ_PREFIX)) {
    const json = LZString.decompressFromEncodedURIComponent(s.slice(CFG_LZ_PREFIX.length));
    if (!json) throw new Error("Échec de décompression du cfg");
    return JSON.parse(json);
  }
  // Ancien format base64 URL-safe (rétro-compatibilité)
  let b64 = s.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  return JSON.parse(decodeURIComponent(escape(atob(b64))));
}

async function refresh() {
  $('#topbar-sub').textContent = 'Chargement…';
  try {
    await loadSchema();
    $('#topbar-sub').textContent = state.tableId
      ? `Table : ${state.tableId} · ${state.columns.length} champ${state.columns.length > 1 ? 's' : ''}`
      : "Aucune table associée";
    renderForm();
  } catch (e) {
    console.error('[form-validator] erreur de chargement :', e);
    $('#topbar-sub').textContent = "Erreur : " + (e.message || e);
    $('#form-host').innerHTML = '';
    $('#form-host').appendChild(el('div', { class: 'form-empty' }, [String(e.message || e)]));
  }
}

boot();
